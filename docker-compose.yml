# Docker Compose – Maktab Platform
# =================================
# docker compose up -d --build

version: '3.9'

services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    container_name: maktab-db
    restart: always
    environment:
      POSTGRES_DB: maktabdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - maktab

  # ─── Backend (Spring Boot) ───
  backend:
    container_name: maktab-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/maktabdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ChangeMeToSecureRandomString123!
    depends_on:
      db:
        condition: service_healthy
    networks:
      - maktab

  # ─── Frontend (React + Vite) ───
  frontend:
    container_name: maktab-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:5173"
    networks:
      - maktab

  # ─── Mini-PC Bridge (Node.js) ───
  device:
    container_name: maktab-device
    build:
      context: ./mini-pc
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      BACKEND_URL: http://backend:8080
      FACE_DEVICE_URL: http://192.168.1.100
      DEVICE_USERNAME: admin
      DEVICE_PASSWORD: admin123
    networks:
      - maktab

  # ─── Telegram Bot (Python) ───
  bot:
    container_name: maktab-bot
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      BOT_TOKEN: "YOUR_TELEGRAM_BOT_TOKEN"
      BACKEND_URL: http://backend:8080
      WEBHOOK_URL: https://bot.maktab.ecos.uz/webhook
    networks:
      - maktab

  # ─── Cloudflare Tunnel ───
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: maktab-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token eyJhIjoiMDI5NDc1MzY0YWNjNDEzY2Q2Y2YzNWVkOGU0MjEzNGIiLCJ0IjoiNTAxY2FmZGMtZmNmZi00NmExLTk4MjctMmU3MTRmMGRjODMwIiwicyI6Ik1XSXdPV0l4TURJdE16QmxNUzAwWW1RekxXSXhZek10TkdJelpUazRZV0pqTmpsbCJ9
    networks:
      - maktab

networks:
  maktab:
    driver: bridge

volumes:
  pgdata:
